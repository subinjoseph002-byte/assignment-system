{% extends 'base.html' %}

{% block title %}Update Assignment - AssignMate{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <h2>Update Assignment</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
            <button type="submit" class="btn-primary">Update Assignment</button>
            <a href="{% url 'teacher_dashboard' %}" class="btn-primary" style="background-color: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); width: auto; padding: 0.6rem 1.5rem; text-align: center;">Cancel</a>
        </div>
    </form>
</div>

<script>
    document.querySelectorAll('input:not([type="submit"]):not([type="hidden"]), select, textarea').forEach(input => {
        input.classList.add('form-input');
    });
</script>
{% endblock %}
