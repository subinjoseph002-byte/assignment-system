{% extends 'base.html' %}

{% block title %}Create Assignment - AssignMate{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <h2>Create New Assignment</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary mt-4">Save Assignment</button>
    </form>
</div>

<script>
    document.querySelectorAll('input:not([type="submit"]):not([type="hidden"]), select, textarea').forEach(input => {
        input.classList.add('form-input');
    });
</script>
{% endblock %}
